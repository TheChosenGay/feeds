syntax = "proto3";

option go_package = "github.com/TheChosenGay/feeds/proto/gen/user";

package feeds.user.v1;

message RegisterReq {
    string username = 1;
    string password = 2;
}

message RegisterResp {
    string id = 1;
}

message UnregisterReq {
    string id = 1;
}

message UnregisterResp {
    bool success = 1;
}

message GetInfoReq {
    string id = 1;
}

message GetInfoResp {
    string id = 1;
    string username = 2;
    string avatar_url = 3;
}

message LoginReq {
    string username = 1;
    string password = 2;
}

message LoginResp {
    bool success = 1;
    string token = 2;
}

message FollowReq {
    string follower_id = 1;
    string followed_id = 2;
}

message FollowResp {
    bool success = 1;
}

message UnfollowReq {
    string follower_id = 1;
    string followed_id = 2;
}

message UnfollowResp {
    bool success = 1;
}

message GetFollowersReq {
    string user_id = 1;
}

message GetFollowersResp {
    repeated string user_ids = 1;
}

message GetFollowingReq {
    string user_id = 1;
}

message GetFollowingResp {
    repeated string user_ids = 1;
}

message IsFollowingReq {
    string follower_id = 1;
    string followed_id = 2;
}

message IsFollowingResp {
    bool is_following = 1;
}

service UserServicev {
    rpc Register(RegisterReq) returns (RegisterResp);
    rpc GetInfo(GetInfoReq) returns (GetInfoResp);
    rpc Unregister(UnregisterReq) returns (UnregisterResp);
    rpc Login(LoginReq) returns (LoginResp);
    rpc Follow(FollowReq) returns (FollowResp);
    rpc Unfollow(UnfollowReq) returns (UnfollowResp);
    rpc GetFollowers(GetFollowersReq) returns (GetFollowersResp);
    rpc GetFollowing(GetFollowingReq) returns (GetFollowingResp);
    rpc IsFollowing(IsFollowingReq) returns (IsFollowingResp);
}
