syntax = "proto3";

package feeds.feed.v1;

option go_package = "github.com/daishan/feeds/proto/gen/feed/v1";

service FeedService {
  rpc GetFeed(GetFeedRequest) returns (GetFeedResponse);
}

message GetFeedRequest {
  string user_id = 1;
  int32 page_size = 2;
  string cursor = 3;
}

message GetFeedResponse {
  repeated FeedItem items = 1;
  string next_cursor = 2;
}

message FeedItem {
  string post_id = 1;
  string author_id = 2;
  string content = 3;
  int32 post_type = 4;
  repeated string image_urls = 5;
  string video_url = 6;
  int64 like_count = 7;
  int64 comment_count = 8;
  int64 share_count = 9;
  int64 created_at = 10;
  // author info denormalized
  string author_nickname = 11;
  string author_avatar_url = 12;
}
