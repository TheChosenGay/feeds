syntax = "proto3";

package feeds.post.v1;

option go_package = "github.com/daishan/feeds/proto/gen/post/v1";

service PostService {
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc GetPost(GetPostRequest) returns (GetPostResponse);
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse);
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
  rpc GetComments(GetCommentsRequest) returns (GetCommentsResponse);
  rpc Like(LikeRequest) returns (LikeResponse);
  rpc Unlike(UnlikeRequest) returns (UnlikeResponse);
}

message CreatePostRequest {
  string user_id = 1;
  string content = 2;
  PostType type = 3;
  repeated string image_urls = 4;
  string video_url = 5;
  string link_url = 6;
}

enum PostType {
  POST_TYPE_UNSPECIFIED = 0;
  POST_TYPE_TEXT = 1;
  POST_TYPE_IMAGE = 2;
  POST_TYPE_VIDEO = 3;
  POST_TYPE_LINK = 4;
}

message CreatePostResponse {
  Post post = 1;
}

message GetPostRequest {
  string post_id = 1;
}

message GetPostResponse {
  Post post = 1;
}

message DeletePostRequest {
  string post_id = 1;
  string user_id = 2;
}

message DeletePostResponse {}

message CreateCommentRequest {
  string post_id = 1;
  string user_id = 2;
  string content = 3;
  string parent_id = 4; // empty for top-level comment
}

message CreateCommentResponse {
  Comment comment = 1;
}

message GetCommentsRequest {
  string post_id = 1;
  int32 page_size = 2;
  string cursor = 3;
}

message GetCommentsResponse {
  repeated Comment comments = 1;
  string next_cursor = 2;
}

message LikeRequest {
  string user_id = 1;
  string post_id = 2;
}

message LikeResponse {}

message UnlikeRequest {
  string user_id = 1;
  string post_id = 2;
}

message UnlikeResponse {}

message Post {
  string id = 1;
  string user_id = 2;
  string content = 3;
  PostType type = 4;
  repeated string image_urls = 5;
  string video_url = 6;
  string link_url = 7;
  int64 like_count = 8;
  int64 comment_count = 9;
  int64 share_count = 10;
  int64 created_at = 11;
}

message Comment {
  string id = 1;
  string post_id = 2;
  string user_id = 3;
  string content = 4;
  string parent_id = 5;
  int64 created_at = 6;
}
