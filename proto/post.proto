syntax = "proto3";

option go_package = "github.com/TheChosenGay/feeds/proto/gen/post";

package feeds.post.v1;

message Block {
    string type = 1;       // text / image / video
    string content = 2;    // text content (for text blocks)
    string url = 3;        // media URL (for image/video blocks)
    string cover_url = 4;  // video cover thumbnail
    int32 width = 5;       // image/video width in pixels
    int32 height = 6;      // image/video height in pixels
    int32 duration = 7;    // video duration in seconds
    int64 size = 8;        // file size in bytes
}

message PostFeedReq {
    string author_id = 1;
    repeated Block blocks = 2;
}

message PostFeedResp {
    string id = 1;
}

message GetFeedReq {
    string id = 1;
}

message GetFeedResp {
    string id = 1;
    string author_id = 2;
    repeated Block blocks = 3;
    int64 created_at = 4;
    int64 updated_at = 5;
}

message ListFeedsReq {
    string author_id = 1;    // optional: filter by author
    int32 page = 2;
    int32 page_size = 3;
}

message ListFeedsResp {
    repeated GetFeedResp feeds = 1;
    int32 total = 2;
}

message DeleteFeedReq {
    string id = 1;
    string author_id = 2;
}

message DeleteFeedResp {
    bool success = 1;
}

service PostService {
    rpc PostFeed(PostFeedReq) returns (PostFeedResp);
    rpc GetFeed(GetFeedReq) returns (GetFeedResp);
    rpc ListFeeds(ListFeedsReq) returns (ListFeedsResp);
    rpc DeleteFeed(DeleteFeedReq) returns (DeleteFeedResp);
}
