services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: feeds-gateway
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      feed-service:
        condition: service_healthy
      interaction-service:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis
      KAFKA_BROKERS: kafka
      USER_SERVICE_ADDR: user-service:9003
      FEED_SERVICE_ADDR: feed-service:9001
      INTERACTION_SERVICE_ADDR: interaction-service:9005
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8080"]
      interval: 5s
      timeout: 5s
      retries: 5
  feed-service:
    build:
      context: .
      dockerfile: services/feed/Dockerfile
    container_name: feeds-feed
    ports:
      - "9001:9001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      KAFKA_BROKERS: kafka:29092
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9001"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    container_name: feeds-user
    ports:
      - "9003:9003"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis
      KAFKA_BROKERS: kafka
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9003"]
      interval: 5s
      timeout: 5s
      retries: 5

  interaction-service:
    build:
      context: .
      dockerfile: services/interaction/Dockerfile
    container_name: feeds-interaction
    ports:
      - "9005:9005"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:29092
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9005"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: feeds-postgres
    environment:
      POSTGRES_USER: feeds
      POSTGRES_PASSWORD: feeds_dev
      POSTGRES_DB: feeds
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feeds"]
      interval: 5s
      timeout: 5s
      retries: 5

  fanout-worker:
    build:
      context: .
      dockerfile: workers/fanout/Dockerfile
    container_name: feeds-fanout
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: host=postgres port=5432 user=feeds password=feeds_dev dbname=feeds sslmode=disable
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: feeds-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: feeds-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: feeds-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./configs/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:latest
    container_name: feeds-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: feeds-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  grafana:
    image: grafana/grafana:latest
    container_name: feeds-grafana
    volumes:
      - ./configs/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/default.yml:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  kafka_data:
